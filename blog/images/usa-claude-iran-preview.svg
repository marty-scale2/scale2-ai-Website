<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <radialGradient id="bg-main" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0a0a0d"/>
    </radialGradient>
    <radialGradient id="glow-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-red-hard">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green-soft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-white">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg-main)"/>
  <rect width="800" height="400" fill="url(#glow-center)"/>

  <!-- Grid -->
  <g opacity="0.035" stroke="#ff4444" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>

  <!-- Target circle (right side, decorative) -->
  <circle cx="580" cy="200" r="120" fill="none" stroke="#ff4444" stroke-width="0.6" opacity="0.12"/>
  <circle cx="580" cy="200" r="80" fill="none" stroke="#ff4444" stroke-width="0.6" opacity="0.16"/>
  <circle cx="580" cy="200" r="40" fill="none" stroke="#ff4444" stroke-width="0.6" opacity="0.22"/>
  <circle cx="580" cy="200" r="8" fill="#ff4444" opacity="0.35" filter="url(#glow-red-hard)"/>
  <!-- Crosshair -->
  <line x1="460" y1="200" x2="572" y2="200" stroke="#ff4444" stroke-width="0.5" opacity="0.2"/>
  <line x1="588" y1="200" x2="700" y2="200" stroke="#ff4444" stroke-width="0.5" opacity="0.2"/>
  <line x1="580" y1="80" x2="580" y2="192" stroke="#ff4444" stroke-width="0.5" opacity="0.2"/>
  <line x1="580" y1="208" x2="580" y2="320" stroke="#ff4444" stroke-width="0.5" opacity="0.2"/>

  <!-- Claude logo mark (stylized asterisk) -->
  <g transform="translate(100, 195)" filter="url(#glow-red-hard)">
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#ff6644" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
    <line x1="-19" y1="-11" x2="19" y2="11" stroke="#ff6644" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
    <line x1="-19" y1="11" x2="19" y2="-11" stroke="#ff6644" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- Main headline -->
  <text font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800">
    <tspan x="148" y="175" font-size="40" fill="#f0f0f2" letter-spacing="-1">KI im Krieg.</tspan>
  </text>
  <text font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700">
    <tspan x="148" y="222" font-size="22" fill="#ff4444" filter="url(#glow-red-hard)" opacity="0.9">Kein Gedankenexperiment mehr.</tspan>
  </text>

  <!-- Subtitle tag -->
  <rect x="148" y="240" width="180" height="26" rx="4" fill="#ff4444" opacity="0.1"/>
  <rect x="148" y="240" width="180" height="26" rx="4" fill="none" stroke="#ff4444" stroke-width="0.75" opacity="0.3"/>
  <text x="158" y="257" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#ff6644" letter-spacing="1" opacity="0.8">USA · ANTHROPIC · IRAN · 2026</text>

  <!-- Green accent line (scale² brand) -->
  <line x1="148" y1="148" x2="320" y2="148" stroke="#39ff14" stroke-width="1.5" opacity="0.35" filter="url(#glow-green-soft)"/>
</svg>
